name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: drinkin
          POSTGRES_PASSWORD: drinkin
          POSTGRES_DB: drinkin
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build shared module
        run: ./gradlew :shared:build

      - name: Build backend
        run: ./gradlew :backend:build
        env:
          DB_URL: jdbc:postgresql://localhost:5432/drinkin
          DB_USER: drinkin
          DB_PASSWORD: drinkin
          JWT_SECRET: ci-test-secret-not-for-production-use-only

      - name: Build Android app
        run: ./gradlew :androidApp:assembleDebug

      - name: Build Web app
        run: ./gradlew :webApp:wasmJsBrowserDistribution
