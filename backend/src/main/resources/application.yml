spring:
  application:
    name: drinkin-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/drinkin}
    username: ${DB_USER:drinkin}
    password: ${DB_PASSWORD:drinkin}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-production}
  expiration-ms: 86400000

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
